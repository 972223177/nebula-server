services:
  mysql:
    image: mysql:8.0
    container_name: nebula-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nebula
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: nebula-server
    ports:
      - "9090:9090"
    environment:
      # Docker 容器网络内用服务名通信，覆盖 application.conf 的 127.0.0.1
      DB_HOST: mysql
      REDIS_HOST: redis
      # 开发环境，自动加载 config/dev.conf 的默认密码
      ENV: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 挂载配置文件方便热改，无需重建镜像
    volumes:
      - ./config:/app/config:ro

volumes:
  mysql-data:

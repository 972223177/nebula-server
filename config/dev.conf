# 开发环境默认配置
# 提供非敏感本地开发默认值，避免每次手动设置环境变量
# 生产环境不使用此文件，所有敏感值由 K8s/环境变量注入

database {
    # docker-compose 中 MYSQL_ROOT_PASSWORD 的默认值
    password = "root123"
    password = ${?DB_PASSWORD}

    # 启动阶段批量查询（如序列号恢复）可能超过默认值，dev 环境放宽到 30s
    leak-detection-threshold = 30000
}

redis {
    # 开发环境 Redis 免密码
    password = ""
    password = ${?REDIS_PASSWORD}
}

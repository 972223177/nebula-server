# Nebula Chat Server - Unified Configuration
# HOCON format (Typesafe Config)
# per D-01/D-02/D-03: 单文件 + 环境变量覆盖模式
#
# 使用方式:
#   dev: 默认值直接使用
#   prod: ENV=prod java -jar server.jar
#   敏感凭据通过环境变量注入 (${?ENV_VAR} 语法)

env = ${?ENV}

server {
    port = 9090
    port = ${?SERVER_PORT}
}

snowflake {
    worker-id = 1
    worker-id = ${?SNOWFLAKE_WORKER_ID}
    epoch = 1700000000000
}

database {
    host = "127.0.0.1"
    host = ${?DB_HOST}
    port = 3306
    port = ${?DB_PORT}
    database = "nebula"
    database = ${?DB_DATABASE}
    username = "root"
    username = ${?DB_USERNAME}
    password = ""
    password = ${?DB_PASSWORD}
    pool-size = 20
    pool-size = ${?DB_POOL_SIZE}
    min-idle = 5
    min-idle = ${?DB_MIN_IDLE}
    connection-timeout = 30000
    connection-timeout = ${?DB_CONNECTION_TIMEOUT}
    idle-timeout = 600000
    idle-timeout = ${?DB_IDLE_TIMEOUT}
    max-lifetime = 1800000
    max-lifetime = ${?DB_MAX_LIFETIME}
    leak-detection-threshold = 10000
    leak-detection-threshold = ${?DB_LEAK_DETECTION_THRESHOLD}
}

ssl {
    enabled = false
    enabled = ${?SSL_ENABLED}
    cert-chain-path = "config/dev/ssl/fullchain.pem"
    cert-chain-path = ${?SSL_CERT_CHAIN_PATH}
    private-key-path = "config/dev/ssl/privkey.pem"
    private-key-path = ${?SSL_PRIVATE_KEY_PATH}
}

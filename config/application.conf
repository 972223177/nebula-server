env = ${?ENV}

server {
    port = 9090
    port = ${?SERVER_PORT}
}

snowflake {
    worker-id = 1
    worker-id = ${?SNOWFLAKE_WORKER_ID}
    epoch = 1700000000000
}

database {
    host = "127.0.0.1"
    host = ${?DB_HOST}
    port = 3306
    port = ${?DB_PORT}
    database = "nebula"
    database = ${?DB_NAME}
    username = "root"
    username = ${?DB_USER}
    # D-77: 生产环境不提供默认密码，缺失时启动即报错
    password = ${?DB_PASSWORD}
    pool-size = 20
    pool-size = ${?DB_POOL_SIZE}
    min-idle = 5
    min-idle = ${?DB_MIN_IDLE}
    connection-timeout = 30000
    connection-timeout = ${?DB_CONNECTION_TIMEOUT}
    idle-timeout = 600000
    idle-timeout = ${?DB_IDLE_TIMEOUT}
    max-lifetime = 1800000
    max-lifetime = ${?DB_MAX_LIFETIME}
    leak-detection-threshold = 10000
    leak-detection-threshold = ${?DB_LEAK_DETECTION_THRESHOLD}
}

redis {
    host = "127.0.0.1"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    # D-77: Redis 密码仅在需要时通过环境变量提供（开发环境免密码）
    password = ${?REDIS_PASSWORD}
    # Redis TLS 连接，默认 false（D-77）
    ssl = false
    ssl = ${?REDIS_SSL}
}

ssl {
    enabled = false
    enabled = ${?SSL_ENABLED}
    cert-chain-path = "config/dev/ssl/fullchain.pem"
    cert-chain-path = ${?SSL_CERT_CHAIN_PATH}
    private-key-path = "config/dev/ssl/privkey.pem"
    private-key-path = ${?SSL_PRIVATE_KEY_PATH}
}

syntax = "proto3";

package com.nebula.chat.conversation;

option java_multiple_files = true;
option java_package = "com.nebula.chat.conversation";

import "nebula/group/group.proto";

message ConvListReq {
  int32 limit = 1;
  int64 cursor = 2;
}

message ConvListResp {
  repeated ConversationBrief conversations = 1;
  bool has_more = 2;
}

message CreateGroupReq {
  string name = 1;
  repeated int64 member_uids = 2;
}

message CreateGroupResp {
  string conversation_id = 1;
  string name = 2;
}

message InviteMemberReq {
  string conversation_id = 1;
  repeated int64 uids = 2;
}

message LeaveGroupReq {
  string conversation_id = 1;
}

message KickMemberReq {
  string conversation_id = 1;
  int64 uid = 2;
}

message EditGroupReq {
  string conversation_id = 1;
  optional string name = 2;
  optional string avatar_url = 3;
}

message GroupMembersReq {
  string conversation_id = 1;
}

message GroupMembersResp {
  repeated com.nebula.chat.group.GroupMember members = 1;
}

message ConversationBrief {
  string conversation_id = 1;
  string type = 2;
  string name = 3;
  string avatar_url = 4;
  int64 last_message_id = 5;
  string last_message_preview = 6;
  int64 last_message_ts = 7;
  int64 last_updated_at = 8;
  int64 last_read_msg_id = 9;
}

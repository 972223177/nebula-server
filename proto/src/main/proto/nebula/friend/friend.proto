syntax = "proto3";

package com.nebula.chat.friend;

option java_multiple_files = true;
option java_package = "com.nebula.chat.friend";

import "nebula/common/common.proto";

message FriendAddReq {
  int64 to_uid = 1;
  string message = 2;
}

message FriendAddResp {
  int64 request_id = 1;
}

message FriendAcceptReq {
  int64 request_id = 1;
}

message FriendRejectReq {
  int64 request_id = 1;
}

message FriendDeleteReq {
  int64 uid = 1;
}

message FriendListReq {
}

message FriendListResp {
  repeated FriendBrief friends = 1;
}

message FriendBrief {
  int64 uid = 1;
  string username = 2;
  string display_name = 3;
  string avatar_url = 4;
  int32 status = 5;
  int64 created_at = 6;
}

message FriendRequestsReq {
}

message FriendRequestsResp {
  repeated FriendRequestItem requests = 1;
}

message FriendRequestItem {
  int64 request_id = 1;
  int64 from_uid = 2;
  string from_username = 3;
  string from_avatar = 4;
  string message = 5;
  string status = 6;
  int64 created_at = 7;
}
